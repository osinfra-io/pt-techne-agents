# Nomos Agent Evals
#
# Run:  cd pt-techne-agents && promptfoo eval -c evals/promptfooconfig.yaml --no-cache
# View: promptfoo view

description: Nomos Agent eval suite — covers all operations

prompts:
  - id: "chat"
    raw: |
      [
        {"role": "system", "content": {{systemPrompt | dump}}},
        {"role": "user", "content": {{message | dump}}}
      ]

defaultTest:
  vars:
    systemPrompt: file://../.github/agents/nomos.agent.md

providers:
  - file://providers.yaml

# ─────────────────────────────────────────────────────────────────────────────
# Helper: extract tool names and text from output
# ─────────────────────────────────────────────────────────────────────────────
# Claude may return tool_use blocks as stringified JSON or native objects.
# Helper pattern used in each assertion:
#   const raw = typeof output === 'string' ? output : JSON.stringify(output);
#   const calls = Array.isArray(output) ? output : (output?.tool_calls || output?.content?.filter?.(c => c.type === 'tool_use') || []);
#   const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
#   // Also extract tool names from stringified output (Anthropic format)
#   const strNames = [...(raw.matchAll(/"name"\s*:\s*"([^"]+)"/g))].map(m => m[1]);
#   const allNames = [...new Set([...names, ...strNames])];
#   const text = typeof output === 'string' ? output : (output?.content?.filter?.(c => c.type === 'text')?.map(c => c.text).join(' ') || output?.content || '');

tests:
  # ═══════════════════════════════════════════════════════════════════════════
  # STARTUP FLOW
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "Startup: greets user as Nomos Agent"
    vars:
      message: "Hi"
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          const text = typeof output === 'string' ? output : (typeof output?.content === 'string' ? output.content : JSON.stringify(output?.content || ''));
          return names.includes('get_me') || text.includes('Nomos');
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          return !names.includes('open_team_pr');

  - description: "Startup: identifies user or greets"
    vars:
      message: "Hello, I need help with my team"
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          const text = typeof output === 'string' ? output : (typeof output?.content === 'string' ? output.content : JSON.stringify(output?.content || ''));
          return names.includes('get_me') || names.includes('lookup_user') || text.includes('Nomos') || text.toLowerCase().includes('help');

  # ═══════════════════════════════════════════════════════════════════════════
  # PROMPT BUILDER INPUT
  # Tests structured prompts generated by docs.osinfra.io/onboarding.
  # Format: "Onboard a new team — {DisplayName}.\nTeam key: ...\n..."
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "PromptBuilder: required-only prompt triggers identity lookup and does not open PR"
    vars:
      message: |
        Onboard a new team — Fides.

        Team key: st-fides
        Display name: Fides

        Maintainers: brettcurtis
        Admin email: brett@osinfra.io
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          const text = typeof output === 'string' ? output : (typeof output?.content === 'string' ? output.content : JSON.stringify(output?.content || ''));
          return names.includes('get_me') || text.includes('Nomos') || text.toLowerCase().includes('fides');
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          return !names.includes('open_team_pr');

  - description: "PromptBuilder: full prompt with optional fields does not open PR without confirmation"
    vars:
      message: |
        Onboard a new team — Fides.

        Team key: st-fides
        Display name: Fides
        Description: Trust and reliability for the platform.

        Maintainers: brettcurtis
        Members: joesmith
        Admin email: brett@osinfra.io

        Enable: enable_google_project, enable_workflows

        GitHub repositories:
        - st-fides-api
        - st-fides-worker
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          return !names.includes('open_team_pr');
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          const text = typeof output === 'string' ? output : (typeof output?.content === 'string' ? output.content : JSON.stringify(output?.content || ''));
          return names.includes('get_me') || text.includes('Nomos') || text.toLowerCase().includes('fides');

  - description: "PromptBuilder: team key is extracted correctly from structured format"
    vars:
      message: |
        Onboard a new team — Nova.

        Team key: st-nova
        Display name: Nova

        Maintainers: alice-dev
        Admin email: alice@osinfra.io
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          const text = typeof output === 'string' ? output : (typeof output?.content === 'string' ? output.content : JSON.stringify(output?.content || ''));
          // Agent must not confuse display name "Nova" with team key "st-nova"
          if (names.includes('open_team_pr')) {
            const prCall = calls.find(c => (c.function?.name || c.name) === 'open_team_pr');
            const args = prCall?.function?.arguments ? JSON.parse(prCall.function.arguments) : (prCall?.input || {});
            return args?.spec?.team_key === 'st-nova';
          }
          return text.toLowerCase().includes('st-nova') || text.toLowerCase().includes('nova') || names.includes('get_me');

  - description: "PromptBuilder: platform-managed project fields included in prompt do not auto-apply"
    vars:
      message: |
        Onboard a new team — Fides.

        Team key: st-fides
        Display name: Fides

        Maintainers: brettcurtis
        Admin email: brett@osinfra.io

        Platform-managed project:
          Cloud SQL: database_version=POSTGRES_16, machine_tier=db-g1-small, regions=us-east1
          Kubernetes Engine: locations=us-east1-b, us-east1-c
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          return !names.includes('open_team_pr');
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          const text = typeof output === 'string' ? output : (typeof output?.content === 'string' ? output.content : JSON.stringify(output?.content || ''));
          return names.includes('get_me') || text.includes('Nomos') || text.toLowerCase().includes('fides') || text.toLowerCase().includes('cloud sql') || text.toLowerCase().includes('kubernetes');

  # ═══════════════════════════════════════════════════════════════════════════
  # OPERATION 1: ONBOARD NEW TEAM
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "Onboard: does not call open_team_pr without confirmation"
    vars:
      message: "I want to onboard a new team called st-temp. I'm brett@osinfra.io / brettcurtis."
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          return !names.includes('open_team_pr');

  - description: "Onboard: begins identification or greets"
    vars:
      message: "Onboard a new team called st-nova. My email is alice@osinfra.io, GitHub username alice-dev."
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          const text = typeof output === 'string' ? output : (typeof output?.content === 'string' ? output.content : JSON.stringify(output?.content || ''));
          return names.includes('get_me') || names.includes('get_file_contents') || names.includes('lookup_user') || text.includes('Nomos') || text.toLowerCase().includes('onboard');

  - description: "Onboard: never fabricates member identities"
    vars:
      message: "Create a new team st-alpha for me"
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const argsStr = calls.map(c => c.function?.arguments || '').join(' ');
          const text = typeof output === 'string' ? output : (typeof output?.content === 'string' ? output.content : JSON.stringify(output?.content || ''));
          const combined = argsStr + ' ' + text;
          return !combined.includes('@example') && !combined.includes('john@') && !combined.includes('jane@') && !combined.includes('user@');

  # ═══════════════════════════════════════════════════════════════════════════
  # OPERATION 2: ADD/REMOVE MEMBER
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "Add member: reads team state or greets"
    vars:
      message: "I'm on pt-arche. Add bob-dev as a member to the GitHub parent team."
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          const text = typeof output === 'string' ? output : (typeof output?.content === 'string' ? output.content : JSON.stringify(output?.content || ''));
          return names.includes('get_me') || names.includes('get_team') || text.includes('Nomos') || text.toLowerCase().includes('add');

  - description: "Remove member: does not auto-remove"
    vars:
      message: "Remove alice-dev from the pt-corpus GitHub parent team"
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          return !names.includes('open_team_pr');

  - description: "Add member to Datadog: asks for info or reads team state"
    vars:
      message: "Add a new member to our Datadog team. Team is pt-logos."
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          const text = typeof output === 'string' ? output : (typeof output?.content === 'string' ? output.content : JSON.stringify(output?.content || ''));
          return names.includes('get_me') || names.includes('get_team') || text.includes('Nomos') || text.toLowerCase().includes('member') || text.toLowerCase().includes('email');

  # ═══════════════════════════════════════════════════════════════════════════
  # OPERATION 3: ADD REPOSITORY
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "Add repo: reads team state or greets"
    vars:
      message: "Add a new repository called pt-arche-workflows to the pt-arche team"
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          const text = typeof output === 'string' ? output : (typeof output?.content === 'string' ? output.content : JSON.stringify(output?.content || ''));
          return names.includes('get_me') || names.includes('get_team') || names.includes('lookup_user') || text.includes('Nomos') || text.toLowerCase().includes('repository');

  - description: "Add repo: does not proceed with invalid prefix name"
    vars:
      message: "Add a repository called my-cool-app to the pt-arche team"
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          return !names.includes('open_team_pr');

  # ═══════════════════════════════════════════════════════════════════════════
  # OPERATION 4: REMOVE REPOSITORY
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "Remove repo: does not auto-remove without confirmation"
    vars:
      message: "Remove the pt-logos-old repository from pt-logos team"
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          return !names.includes('open_team_pr');

  # ═══════════════════════════════════════════════════════════════════════════
  # OPERATION 5: ADD GITHUB ENVIRONMENT
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "Add environment: does not auto-apply"
    vars:
      message: "Add a staging environment to the pt-corpus repo on pt-corpus team"
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          return !names.includes('open_team_pr');

  # ═══════════════════════════════════════════════════════════════════════════
  # OPERATION 6: REMOVE GITHUB ENVIRONMENT
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "Remove environment: requires explicit confirmation"
    vars:
      message: "Remove the staging environment from pt-corpus repo"
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          return !names.includes('open_team_pr');

  # ═══════════════════════════════════════════════════════════════════════════
  # OPERATION 7: ENABLE/DISABLE FEATURE FLAG
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "Feature flag: reads team or greets"
    vars:
      message: "Enable workflows for pt-arche"
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          const text = typeof output === 'string' ? output : (typeof output?.content === 'string' ? output.content : JSON.stringify(output?.content || ''));
          return names.includes('get_me') || names.includes('get_team') || text.includes('Nomos') || text.toLowerCase().includes('workflow');

  - description: "Feature flag: does not auto-enable without confirmation"
    vars:
      message: "Turn on enable_opentofu_state_management for st-ethos"
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          return !names.includes('open_team_pr');

  # ═══════════════════════════════════════════════════════════════════════════
  # OPERATION 8: ADD GCP PROJECT
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "Add GCP project: does not auto-apply"
    vars:
      message: "Add a Google Cloud Platform project for pt-arche"
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          return !names.includes('open_team_pr');

  # ═══════════════════════════════════════════════════════════════════════════
  # OPERATION 9: REMOVE GCP PROJECT
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "Remove GCP project: requires confirmation (destructive)"
    vars:
      message: "Remove the GCP project from st-ethos"
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          return !names.includes('open_team_pr');

  # ═══════════════════════════════════════════════════════════════════════════
  # OPERATION 10: ADD GKE CLUSTER LOCATION
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "GKE cluster: does not auto-apply"
    vars:
      message: "Add a GKE cluster in us-east1-b for pt-pneuma"
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          return !names.includes('open_team_pr');

  - description: "GKE cluster: does not ask user for CIDRs"
    vars:
      message: "I need to add a new GKE cluster location us-east4-a for st-ethos. Machine type e2-standard-4, min 2, max 5."
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || output?.content?.filter?.(c => c.type === 'tool_use') || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const namesLower = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])].map(n => n.toLowerCase());
          const textLower = (typeof output === 'string' ? output : (typeof output?.content === 'string' ? output.content : JSON.stringify(output?.content || ''))).toLowerCase();
          // Acceptable: agent calls next_available_cidrs, or mentions cidr only in the context of
          // suggesting/confirming/automatically handling — not asking the user to supply them
          if (namesLower.includes('next_available_cidrs')) return true;
          return !textLower.includes('cidr') || textLower.includes('suggest') || textLower.includes('confirm') || textLower.includes('automat') || textLower.includes('allocat');

  # ═══════════════════════════════════════════════════════════════════════════
  # OPERATION 11: ADD CLOUD SQL
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "Cloud SQL: does not auto-apply"
    vars:
      message: "Add Cloud SQL to pt-arche. Use us-east1, POSTGRES_16, db-f1-micro."
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          return !names.includes('open_team_pr');

  # ═══════════════════════════════════════════════════════════════════════════
  # OPERATION 12: OPEN GITHUB ISSUE
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "Open issue: acknowledges bug report"
    vars:
      message: "I want to report a bug. The sandbox deployment is failing with a timeout error."
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
