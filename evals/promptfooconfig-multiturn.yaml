# Nomos Agent Multi-turn Evals
#
# Run:  cd pt-techne-agents && promptfoo eval -c evals/promptfooconfig-multiturn.yaml --no-cache
# View: promptfoo view

description: Nomos Agent multi-turn eval suite — covers sequential workflow flows

prompts:
  - id: multiturn
    raw: |
      [
        {"role": "system", "content": {{systemPrompt | dump}}}
        {%- for msg in conversation %},
        {{ msg | dump }}
        {%- endfor %}
      ]

defaultTest:
  vars:
    systemPrompt: file://../.github/agents/techne-nomos.agent.md

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    label: claude-sonnet
    config:
      temperature: 0
      max_tokens: 1024
      tools:
        - type: function
          function:
            name: get_me
            description: Get the authenticated GitHub user's profile
            parameters:
              type: object
              properties: {}

        - type: function
          function:
            name: lookup_user
            description: Find every team and role where a user appears across all teams. Provide exactly one of github_username or email.
            parameters:
              type: object
              properties:
                github_username:
                  type: string
                  description: GitHub username to look up
                email:
                  type: string
                  description: Email address to look up

        - type: function
          function:
            name: get_team
            description: Fetch one team's parsed spec as JSON
            parameters:
              type: object
              properties:
                team_key:
                  type: string
                  description: "The team key, e.g. 'pt-arche'"
              required: [team_key]

        - type: function
          function:
            name: list_teams
            description: List every team defined in pt-logos with one summary row per team
            parameters:
              type: object
              properties: {}

        - type: function
          function:
            name: find_repo
            description: Find which team(s) own a GitHub repository
            parameters:
              type: object
              properties:
                name:
                  type: string
                  description: Repository name to look up
              required: [name]

        - type: function
          function:
            name: open_team_pr
            description: Validate, render, and open-or-update a PR on pt-logos for the given team spec. Always pass the full spec.
            parameters:
              type: object
              properties:
                spec:
                  type: object
                  description: The complete validated team spec
              required: [spec]

        - type: function
          function:
            name: open_team_docs_pr
            description: Open a docs PR on pt-ekklesia-docs for the given team spec
            parameters:
              type: object
              properties:
                spec:
                  type: object
                  description: The validated team spec
              required: [spec]

        - type: function
          function:
            name: render_team_helpers
            description: Render patched helpers.tofu for both pt-corpus and pt-pneuma with a team workspace inserted
            parameters:
              type: object
              properties:
                team_key:
                  type: string
                  description: The team key
              required: [team_key]

        - type: function
          function:
            name: open_team_helpers_pr
            description: Open or update a PR in both pt-corpus and pt-pneuma inserting the team workspace into helpers.tofu logos_workspaces
            parameters:
              type: object
              properties:
                team_key:
                  type: string
                  description: The team key
                branch:
                  type: string
                  description: Optional branch name override
                message:
                  type: string
                  description: Optional PR title override
                labels:
                  type: array
                  items:
                    type: string
                  description: Optional labels to apply to the PRs
              required: [team_key]

        - type: function
          function:
            name: next_available_cidrs
            description: Return the next available CIDR slot(s) from the networking inventory
            parameters:
              type: object
              properties:
                count:
                  type: integer
                  description: Number of CIDR slots to allocate
              required: [count]

        - type: function
          function:
            name: search_users
            description: Search GitHub users by username or profile info
            parameters:
              type: object
              properties:
                query:
                  type: string
                  description: User search query
              required: [query]

        - type: function
          function:
            name: get_file_contents
            description: Get the contents of a file from a GitHub repository
            parameters:
              type: object
              properties:
                owner:
                  type: string
                repo:
                  type: string
                path:
                  type: string
                ref:
                  type: string
              required: [owner, repo, path]

        - type: function
          function:
            name: create_branch
            description: Create a new branch in a GitHub repository
            parameters:
              type: object
              properties:
                owner:
                  type: string
                repo:
                  type: string
                branch:
                  type: string
              required: [owner, repo, branch]

        - type: function
          function:
            name: push_files
            description: Push multiple files to a GitHub repository in a single commit
            parameters:
              type: object
              properties:
                owner:
                  type: string
                repo:
                  type: string
                branch:
                  type: string
                files:
                  type: array
                  items:
                    type: object
                    properties:
                      path:
                        type: string
                      content:
                        type: string
                message:
                  type: string
              required: [owner, repo, branch, files, message]

        - type: function
          function:
            name: create_pull_request
            description: Create a new pull request in a GitHub repository
            parameters:
              type: object
              properties:
                owner:
                  type: string
                repo:
                  type: string
                title:
                  type: string
                head:
                  type: string
                base:
                  type: string
                body:
                  type: string
              required: [owner, repo, title, head, base]

        - type: function
          function:
            name: search_pull_requests
            description: Search for pull requests in GitHub repositories
            parameters:
              type: object
              properties:
                query:
                  type: string
                owner:
                  type: string
                repo:
                  type: string
              required: [query]

        - type: function
          function:
            name: issue_write
            description: Create or update a GitHub issue
            parameters:
              type: object
              properties:
                method:
                  type: string
                  enum: [create, update]
                owner:
                  type: string
                repo:
                  type: string
                title:
                  type: string
                body:
                  type: string
                labels:
                  type: array
                  items:
                    type: string
              required: [method, owner, repo]

# ─────────────────────────────────────────────────────────────────────────────
# Helper: extract tool names and text from output
# ─────────────────────────────────────────────────────────────────────────────
# Claude may return tool_use blocks as stringified JSON or native objects.
# Helper pattern used in each assertion:
#   const raw = typeof output === 'string' ? output : JSON.stringify(output);
#   const calls = Array.isArray(output) ? output : (output?.tool_calls || output?.content?.filter?.(c => c.type === 'tool_use') || []);
#   const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
#   const text = typeof output === 'string' ? output : (Array.isArray(output?.content) ? output.content.filter(c => c.type === 'text').map(c => c.text).join(' ') : (output?.content || ''));

tests:
  # ═══════════════════════════════════════════════════════════════════════════
  # TEST 1: ONBOARD — after identity lookup, asks for team key (no PR)
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "Multi-turn onboard: after identity lookup, asks for team key — no premature PR, no question bundling"
    vars:
      conversation:
        - role: user
          content: Hi, I want to onboard a new team.
        - role: assistant
          content:
            - type: text
              text: "👋 Hi! I'm the Nomos Agent — your self-serve interface to the osinfra.io platform. Give me just a moment while I look you up…"
            - type: tool_use
              id: toolu_01
              name: get_me
              input: {}
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolu_01
              content: '{"login":"alice-dev","email":"alice@osinfra.io"}'
        - role: assistant
          content:
            - type: tool_use
              id: toolu_02
              name: lookup_user
              input:
                github_username: alice-dev
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolu_02
              content: '{"matches":[]}'
        - role: assistant
          content:
            - type: tool_use
              id: toolu_03
              name: lookup_user
              input:
                email: alice@osinfra.io
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolu_03
              content: '{"matches":[]}'
        - role: assistant
          content: "Welcome to the platform! I don't see you on any existing teams yet. Would you like to join an existing team or onboard a new one?"
        - role: user
          content: I'd like to onboard a new team.
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || output?.content?.filter?.(c => c.type === 'tool_use') || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          return !names.includes('open_team_pr');
      - type: javascript
        value: |
          const text = typeof output === 'string' ? output : (Array.isArray(output?.content) ? output.content.filter(c => c.type === 'text').map(c => c.text).join(' ') : (typeof output?.content === 'string' ? output.content : ''));
          const lower = text.toLowerCase();
          return lower.includes('team') || lower.includes('key') || lower.includes('name') || lower.includes('onboard');
      - type: javascript
        value: |
          // No question bundling — asking for team key should not also ask about Datadog, GitHub, or Google groups
          const text = typeof output === 'string' ? output : (Array.isArray(output?.content) ? output.content.filter(c => c.type === 'text').map(c => c.text).join(' ') : (typeof output?.content === 'string' ? output.content : ''));
          const hasDatadog = /datadog/i.test(text);
          const hasGitHub = /github\s+(username|maintainer|member)/i.test(text);
          const hasGoogle = /google\s+(group|cloud|identity)/i.test(text);
          return [hasDatadog, hasGitHub, hasGoogle].filter(Boolean).length < 2;

  # ═══════════════════════════════════════════════════════════════════════════
  # TEST 2: ONBOARD — all required fields collected, optional menu shown (no PR)
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "Multi-turn onboard: all required fields collected — optional menu or summary shown, no PR"
    vars:
      conversation:
        - role: user
          content: I want to onboard a new team.
        - role: assistant
          content:
            - type: text
              text: "👋 Hi! I'm the Nomos Agent. Give me a moment while I look you up…"
            - type: tool_use
              id: toolu_01
              name: get_me
              input: {}
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolu_01
              content: '{"login":"alice-dev","email":"alice@osinfra.io"}'
        - role: assistant
          content:
            - type: tool_use
              id: toolu_02
              name: lookup_user
              input:
                github_username: alice-dev
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolu_02
              content: '{"matches":[]}'
        - role: assistant
          content:
            - type: tool_use
              id: toolu_03
              name: lookup_user
              input:
                email: alice@osinfra.io
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolu_03
              content: '{"matches":[]}'
        - role: assistant
          content: Welcome! You're not on any teams yet. Would you like to onboard a new team or join an existing one?
        - role: user
          content: "Onboard a new team — the key is st-nova."
        - role: assistant
          content: "I'll use **Nova** as the display name for **st-nova** (stream-aligned team). Does that sound right, and can you give me a brief description of the team?"
        - role: user
          content: "Yes, Nova is fine. Description: Nova team for stream-aligned delivery workloads."
        - role: assistant
          content: Got it. What email address(es) should be Datadog admins for st-nova? (@osinfra.io addresses)
        - role: user
          content: alice@osinfra.io
        - role: assistant
          content: Got it — alice@osinfra.io as Datadog admin. Who should be the GitHub parent team maintainers? (GitHub usernames)
        - role: user
          content: alice-dev
        - role: assistant
          content: "Got it. For the Google Cloud Identity groups, let's start with the **admin** group (manages sensitive tasks like billing and IAM). Who should be the owners? (@osinfra.io emails)"
        - role: user
          content: alice@osinfra.io for all three Google groups.
        - role: assistant
          content: >-
            ✅ Required fields are all set for **st-nova**:
            - Datadog admin: alice@osinfra.io
            - GitHub maintainer: alice-dev
            - Google groups owners (admin/reader/writer): alice@osinfra.io

            Would you like to configure any optional enhancements — GitHub Actions/OIDC, repositories,
            GKE clusters, Cloud SQL, or additional GCP projects — or proceed straight to the summary?
        - role: user
          content: Skip the optional enhancements and show me the summary.
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || output?.content?.filter?.(c => c.type === 'tool_use') || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          return !names.includes('open_team_pr');
      - type: javascript
        value: |
          const text = typeof output === 'string' ? output : (Array.isArray(output?.content) ? output.content.filter(c => c.type === 'text').map(c => c.text).join(' ') : (typeof output?.content === 'string' ? output.content : ''));
          const lower = text.toLowerCase();
          return lower.includes('st-nova') || lower.includes('nova') || lower.includes('summary') || lower.includes('confirm') || lower.includes('proceed');

  # ═══════════════════════════════════════════════════════════════════════════
  # TEST 3: ONBOARD — explicit "yes" after summary triggers PR creation
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "Multi-turn onboard: explicit confirmation after summary — open_team_pr and open_team_docs_pr are called"
    vars:
      conversation:
        - role: user
          content: I want to onboard a new team.
        - role: assistant
          content:
            - type: text
              text: "👋 Hi! I'm the Nomos Agent. Give me a moment while I look you up…"
            - type: tool_use
              id: toolu_01
              name: get_me
              input: {}
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolu_01
              content: '{"login":"alice-dev","email":"alice@osinfra.io"}'
        - role: assistant
          content:
            - type: tool_use
              id: toolu_02
              name: lookup_user
              input:
                github_username: alice-dev
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolu_02
              content: '{"matches":[]}'
        - role: assistant
          content:
            - type: tool_use
              id: toolu_03
              name: lookup_user
              input:
                email: alice@osinfra.io
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolu_03
              content: '{"matches":[]}'
        - role: assistant
          content: Welcome! Let's get your team registered. You're not on any teams yet.
        - role: user
          content: "Team key: st-nova. Display name: Nova. Description: Nova team for stream-aligned delivery workloads."
        - role: assistant
          content: Got it — **st-nova** ("Nova"), stream-aligned team. What email address(es) should be Datadog admins?
        - role: user
          content: alice@osinfra.io
        - role: assistant
          content: Got it. Who should be the GitHub parent team maintainers?
        - role: user
          content: alice-dev
        - role: assistant
          content: Got it. Who should own the Google Cloud Identity groups (admin, reader, and writer)?
        - role: user
          content: alice@osinfra.io for all three groups.
        - role: assistant
          content: No optional enhancements — proceeding to summary.
        - role: user
          content: Yes, skip optional enhancements.
        - role: assistant
          content: >-
            Here's a summary of what I'll create for **st-nova**:

            | Field | Value |
            |-------|-------|
            | Team key | st-nova |
            | Team type | stream-aligned |
            | Display name | Nova |
            | Description | Nova team for stream-aligned delivery workloads |
            | Datadog admin | alice@osinfra.io |
            | GitHub maintainer | alice-dev |
            | Google groups owners | alice@osinfra.io (admin / reader / writer) |

            This will open three pull requests: **PR 1** adds the GitHub environment to pt-logos,
            **PR 2** onboards the team, and **PR 3** creates the docs page.

            Shall I go ahead?
        - role: user
          content: "Yes, go ahead and create the PRs."
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || output?.content?.filter?.(c => c.type === 'tool_use') || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          // get_team is called to read the pt-logos spec for PR 1; open_team_pr follows
          return names.includes('open_team_pr') || names.includes('get_team');
      - type: javascript
        value: |
          // Should not fabricate identities not present in the conversation
          const calls = Array.isArray(output) ? output : (output?.tool_calls || output?.content?.filter?.(c => c.type === 'tool_use') || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const argsStr = [...(raw.matchAll(/"arguments"\s*:\s*"((?:[^"\\]|\\.)*)"/g))].map(m => m[1]).join(' ');
          return !argsStr.includes('@example') && !argsStr.includes('john@') && !argsStr.includes('jane@');
      - type: javascript
        value: |
          // search_pull_requests must not precede open_team_pr
          const calls = Array.isArray(output) ? output : (output?.tool_calls || output?.content?.filter?.(c => c.type === 'tool_use') || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          const searchIdx = names.indexOf('search_pull_requests');
          const openIdx = names.indexOf('open_team_pr');
          if (searchIdx >= 0 && openIdx >= 0 && searchIdx < openIdx) return false;
          return true;

  # ═══════════════════════════════════════════════════════════════════════════
  # TEST 4: ADD MEMBER — explicit confirmation triggers open_team_pr
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "Multi-turn add member: explicit confirmation — open_team_pr is called with updated spec"
    vars:
      conversation:
        - role: user
          content: Add charlie-dev to the pt-arche GitHub parent team as a member.
        - role: assistant
          content:
            - type: text
              text: "👋 Hi! I'm the Nomos Agent. Give me a moment while I look you up…"
            - type: tool_use
              id: toolu_01
              name: get_me
              input: {}
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolu_01
              content: '{"login":"brettcurtis","email":"brett@osinfra.io"}'
        - role: assistant
          content:
            - type: tool_use
              id: toolu_02
              name: lookup_user
              input:
                github_username: brettcurtis
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolu_02
              content: '{"matches":[{"team_key":"pt-arche","roles":["github_parent_team.maintainers"]}]}'
        - role: assistant
          content:
            - type: tool_use
              id: toolu_03
              name: lookup_user
              input:
                email: brett@osinfra.io
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolu_03
              content: '{"matches":[{"team_key":"pt-arche","roles":["google_groups.admin.owners","datadog.admin_emails"]}]}'
        - role: assistant
          content:
            - type: text
              text: I can see you're a maintainer of pt-arche. Let me load the current team spec.
            - type: tool_use
              id: toolu_04
              name: get_team
              input:
                team_key: pt-arche
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolu_04
              content: >-
                {"team_key":"pt-arche","team_type":"platform","display_name":"Arche","display_name_comment":"Infrastructure as Code modules for the osinfra.io platform","datadog":{"admin_emails":["brett@osinfra.io"]},"github_parent_team":{"maintainers":["brettcurtis"],"members":[]},"github_child_teams":{"sandbox-approvers":{"maintainers":["brettcurtis"]},"non-production-approvers":{"maintainers":["brettcurtis"]},"production-approvers":{"maintainers":["brettcurtis"]},"repository-administrators":{"maintainers":["brettcurtis"]}},"google_groups":{"admin":{"owners":["brett@osinfra.io"]},"reader":{"owners":["brett@osinfra.io"]},"writer":{"owners":["brett@osinfra.io"]}}}
        - role: assistant
          content: >-
            Here's what I'll change for **pt-arche**:

            **Add member:** `charlie-dev` → GitHub parent team (members)

            Ready to open a pull request?
        - role: user
          content: "Yes, confirmed — go ahead."
    assert:
      - type: javascript
        value: |
          const calls = Array.isArray(output) ? output : (output?.tool_calls || output?.content?.filter?.(c => c.type === 'tool_use') || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          return names.includes('open_team_pr');
      - type: javascript
        value: |
          // search_pull_requests must not precede open_team_pr
          const calls = Array.isArray(output) ? output : (output?.tool_calls || output?.content?.filter?.(c => c.type === 'tool_use') || []);
          const raw = typeof output === 'string' ? output : JSON.stringify(output);
          const names = [...new Set([...calls.map(c => c.function?.name || c.name).filter(Boolean), ...[...raw.matchAll(/"name"\s*:\s*"([^"]+)"/g)].map(m => m[1])])];
          const searchIdx = names.indexOf('search_pull_requests');
          const openIdx = names.indexOf('open_team_pr');
          if (searchIdx >= 0 && openIdx >= 0 && searchIdx < openIdx) return false;
          return true;

  # ═══════════════════════════════════════════════════════════════════════════
  # TEST 5: ADD REPOSITORY — collects repo info before opening PR
  # ═══════════════════════════════════════════════════════════════════════════

  - description: "Multi-turn add repo: collecting name and description across turns — no PR before confirmation"
    vars:
      conversation:
        - role: user
          content: I want to add a new repository to pt-arche.
        - role: assistant
          content:
            - type: text
              text: "👋 Hi! I'm the Nomos Agent. Give me a moment while I look you up…"
            - type: tool_use
              id: toolu_01
              name: get_me
              input: {}
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolu_01
              content: '{"login":"brettcurtis","email":"brett@osinfra.io"}'
        - role: assistant
          content:
            - type: tool_use
              id: toolu_02
              name: lookup_user
              input:
                github_username: brettcurtis
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolu_02
              content: '{"matches":[{"team_key":"pt-arche","roles":["github_parent_team.maintainers"]}]}'
        - role: assistant
          content:
            - type: tool_use
              id: toolu_03
              name: lookup_user
              input:
                email: brett@osinfra.io
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolu_03
              content: '{"matches":[{"team_key":"pt-arche","roles":["google_groups.admin.owners"]}]}'
        - role: assistant
          content:
            - type: text
              text: I can see you're on pt-arche. Let me load the current spec.
            - type: tool_use
              id: toolu_04
              name: get_team
              input:
                team_key: pt-arche
        - role: user
          content:
            - type: tool_result
              tool_use_id: toolu_04
              content: >-
