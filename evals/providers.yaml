id: anthropic:messages:claude-sonnet-4-6
label: claude-sonnet
config:
  temperature: 0
  max_tokens: 1024
  tools:
    - type: function
      function:
        name: get_me
        description: Get the authenticated GitHub user's profile
        parameters:
          type: object
          properties: {}

    - type: function
      function:
        name: lookup_user
        description: Find every team and role where a user appears across all teams. Provide exactly one of github_username or email.
        parameters:
          type: object
          properties:
            github_username:
              type: string
              description: GitHub username to look up
            email:
              type: string
              description: Email address to look up

    - type: function
      function:
        name: get_team
        description: Fetch one team's parsed spec as JSON
        parameters:
          type: object
          properties:
            team_key:
              type: string
              description: "The team key, e.g. 'pt-arche'"
          required: [team_key]

    - type: function
      function:
        name: list_teams
        description: List every team defined in pt-logos with one summary row per team
        parameters:
          type: object
          properties: {}

    - type: function
      function:
        name: find_repo
        description: Find which team(s) own a GitHub repository
        parameters:
          type: object
          properties:
            name:
              type: string
              description: Repository name to look up
          required: [name]

    - type: function
      function:
        name: open_team_pr
        description: Validate, render, and open-or-update a PR on pt-logos for the given team spec. Always pass the full spec.
        parameters:
          type: object
          properties:
            spec:
              type: object
              description: The complete validated team spec
            message:
              type: string
              description: Optional commit/PR title override
            branch:
              type: string
              description: Optional branch name override
            labels:
              type: array
              items:
                type: string
              description: Optional labels to apply to the PR
          required: [spec]

    - type: function
      function:
        name: open_team_docs_pr
        description: Open a docs PR on pt-ekklesia-docs for the given team spec
        parameters:
          type: object
          properties:
            spec:
              type: object
              description: The validated team spec
            message:
              type: string
              description: Optional commit/PR title override
            branch:
              type: string
              description: Optional branch name override
            labels:
              type: array
              items:
                type: string
              description: Optional labels to apply to the PR
          required: [spec]

    - type: function
      function:
        name: open_team_helpers_pr
        description: Open or update a PR in both pt-corpus and pt-pneuma inserting the team workspace into helpers.tofu logos_workspaces
        parameters:
          type: object
          properties:
            team_key:
              type: string
              description: The team key
            branch:
              type: string
              description: Optional branch name override
            message:
              type: string
              description: Optional PR title override
            labels:
              type: array
              items:
                type: string
              description: Optional labels to apply to the PRs
          required: [team_key]

    - type: function
      function:
        name: next_available_cidrs
        description: Return the next available CIDR slot(s) from the networking inventory
        parameters:
          type: object
          properties:
            count:
              type: integer
              description: Number of CIDR slots to allocate
          required: [count]

    - type: function
      function:
        name: search_users
        description: Search GitHub users by username or profile info
        parameters:
          type: object
          properties:
            query:
              type: string
              description: User search query
          required: [query]

    - type: function
      function:
        name: get_file_contents
        description: Get the contents of a file from a GitHub repository
        parameters:
          type: object
          properties:
            owner:
              type: string
            repo:
              type: string
            path:
              type: string
            ref:
              type: string
          required: [owner, repo, path]

    - type: function
      function:
        name: create_branch
        description: Create a new branch in a GitHub repository
        parameters:
          type: object
          properties:
            owner:
              type: string
            repo:
              type: string
            branch:
              type: string
          required: [owner, repo, branch]

    - type: function
      function:
        name: push_files
        description: Push multiple files to a GitHub repository in a single commit
        parameters:
          type: object
          properties:
            owner:
              type: string
            repo:
              type: string
            branch:
              type: string
            files:
              type: array
              items:
                type: object
                properties:
                  path:
                    type: string
                  content:
                    type: string
            message:
              type: string
          required: [owner, repo, branch, files, message]

    - type: function
      function:
        name: create_pull_request
        description: Create a new pull request in a GitHub repository
        parameters:
          type: object
          properties:
            owner:
              type: string
            repo:
              type: string
            title:
              type: string
            head:
              type: string
            base:
              type: string
            body:
              type: string
          required: [owner, repo, title, head, base]

    - type: function
      function:
        name: search_pull_requests
        description: Search for pull requests in GitHub repositories
        parameters:
          type: object
          properties:
            query:
              type: string
            owner:
              type: string
            repo:
              type: string
          required: [query]

    - type: function
      function:
        name: issue_write
        description: Create or update a GitHub issue
        parameters:
          type: object
          properties:
            method:
              type: string
              enum: [create, update]
            owner:
              type: string
            repo:
              type: string
            issue_number:
              type: integer
              description: Issue (or PR) number to update; required for method=update
            title:
              type: string
            body:
              type: string
            labels:
              type: array
              items:
                type: string
          required: [method, owner, repo]
