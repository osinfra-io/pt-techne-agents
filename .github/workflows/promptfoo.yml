name: Promptfoo

on:
  pull_request:
    paths:
      - '.github/agents/**'
      - 'evals/**'
  workflow_dispatch:

concurrency:
  group: promptfoo-${{ github.head_ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  eval:
    name: Evaluations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Promptfoo
        uses: promptfoo/promptfoo-action@e2b793945efd6eb3014332602598c84252eddd1f # v1.3.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config: evals/promptfooconfig.yaml
          disable-comment: true
          no-share: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

