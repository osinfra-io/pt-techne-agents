name: Promptfoo

on:
  pull_request:
    paths:
      - '.github/agents/**'
      - 'evals/**'
  workflow_dispatch:

permissions:
  contents: read
  models: read
  pull-requests: write

jobs:
  eval:
    name: Evaluations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: promptfoo/promptfoo-action@e2b793945efd6eb3014332602598c84252eddd1f # v1.3.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config: evals/promptfooconfig.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
